name: Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: Run linting
      - name: Run linting
        run: npm run lint

      # Step 5: Build Next.js application
      - name: Build application
        run: npm run build

      # Step 6: Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 7: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_IMAGE_NAME }}:latest .
          docker tag ${{ secrets.DOCKER_IMAGE_NAME }}:latest ${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      # Step 8: Push Docker image to Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      # Step 9: Deploy to VPS
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to deployment directory
            cd /opt/vysio-landing || exit 1
            
            # Set environment variable for docker-compose
            export DOCKER_IMAGE_NAME=${{ secrets.DOCKER_IMAGE_NAME }}
            
            # Pull latest image
            docker-compose pull
            
            # Stop old container
            docker-compose down
            
            # Start new container
            docker-compose up -d
            
            # Wait for container to be healthy
            sleep 10
            
            # Check if container is running
            if [ "$(docker ps -q -f name=vysio-landing)" ]; then
              echo "✅ Deployment successful!"
              docker ps -f name=vysio-landing
            else
              echo "❌ Deployment failed!"
              docker logs vysio-landing
              exit 1
            fi
            
            # Clean up old images
            docker image prune -af --filter "until=24h"

      # Step 10: Notify deployment status
      - name: Deployment notification
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ Deployment completed successfully!"
            echo "🌐 Application is now live at http://${{ secrets.VPS_HOST }}"
          else
            echo "❌ Deployment failed. Please check the logs."
          fi

