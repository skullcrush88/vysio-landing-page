version: '3.8'

services:
  web:
    image: ${DOCKER_IMAGE_NAME:-your-dockerhub-username/vysio-landing}:latest
    container_name: vysio-landing
    ports:
      - "80:80"
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

